[workspace]
name = "rawviewer"
version = "3.0.0"
description = "RAWviewer - Professional RAW Image Viewer with Semantic Search"
authors = ["Mark Yip"]
channels = ["conda-forge"]
# pyexiv2 arm64 wheels target macOS 14+ (macosx_14_0_arm64); Intel wheels use
# macosx_13_0_x86_64. Pin __osx via per-platform virtual packages (pixi >= 0.73).
platforms = [
    "win-64",
    { platform = "osx-arm64", macos = "14.0" },
    { platform = "osx-64", macos = "14.0" },
]

[tasks]
start = "python src/main.py"
start-windowless = "pythonw src/main.py"

[activation.env]
PYTHONNOUSERSITE = "1"
RAWVIEWER_GPU_VIEW = "1"
# GPU demosaic stays off in day-to-day pixi runs (matches app default). Set to
# "1" only when intentionally A/B testing CUDA/MPS demosaic; use run_debug.bat
# for the same stress profile. Large RAF/high-MP frames are unstable/slower.
RAWVIEWER_PREFER_GPU_DECODE = "0"
# LibRaw process pool: leave unset so use_raw_process_pool() auto-enables on
# Windows/Linux when GPU demosaic is not in use (CPU Fast RAW concurrency).
# Set RAWVIEWER_USE_PROCESS_POOL=0 only when intentionally single-process.


[dependencies]
python = ">=3.10,<3.13"
pip = "*"
llvm-openmp = ">=22.1.8,<23"
libjpeg-turbo = ">=3.1.4.1,<4"

[pypi-dependencies]
PyQt6 = ">=6.6.0"
rawpy = ">=0.27.0"
numpy = ">=2.0.0"
Pillow = ">=10.0.0"
tifffile = ">=2023.7.10"
send2trash = ">=1.8.0"
natsort = ">=8.4.0"
exifread = ">=3.0.0"
psutil = ">=5.9.0"
qtawesome = ">=1.2.0"
pycountry = "*"
opencv-python-headless = "*"
lensfunpy = ">=1.14.0"
huggingface_hub = "*"
requests = "*"
certifi = "*"
pillow-heif = "*"
# Default PyPI torch (macOS MPS / CPU). Windows overrides below to CUDA wheels.
torch = ">=2.2.2, <3"
kornia = ">=0.8.3, <0.9"
spandrel = ">=0.4.2, <0.5"


# Windows semantic search (MobileCLIP ONNX). Default for `pixi install` / `pixi run`.
# - Local dev: onnxruntime-gpu (CUDA EP when a GPU is available).
# - Installer variants: build scripts swap this to onnxruntime-directml for DirectML builds
#   (see scripts/Launch/bat/build_windows_directml.bat and build.py --windows-accel).
[target.win-64.pypi-dependencies]
# CUDA demosaic / kornia path: PyPI's default Windows torch is CPU-only.
# The cu124 wheel is ~2.3–2.4 GB by itself (bundled NVIDIA libs).
torch = { version = ">=2.5.1, <3", index = "https://download.pytorch.org/whl/cu124" }
# Prefer DirectML for MobileCLIP ONNX — do NOT also install onnxruntime-gpu
# (a second CUDA stack, often +0.5–1.5 GB on top of torch).
onnxruntime-directml = ">=1.18.0"
pyexiv2 = "*"
pywin32 = "*"
comtypes = "*"
"winrt-Windows.ApplicationModel.DataTransfer" = "*"
"winrt-Windows.Storage" = "*"

# macOS EXIF (Exiv2). After `pixi install`, ensure native libs: brew install inih gettext
[target.osx-arm64.pypi-dependencies]
pyexiv2 = ">=2.15.4"
pyobjc-framework-Cocoa = "*"
pyobjc-framework-Quartz = "*"
pyobjc-framework-CoreML = "*"
pyobjc-framework-Vision = "*"

[target.osx-64.pypi-dependencies]
pyexiv2 = ">=2.15.4"
pyobjc-framework-Cocoa = "*"
pyobjc-framework-Quartz = "*"
pyobjc-framework-CoreML = "*"
pyobjc-framework-Vision = "*"
